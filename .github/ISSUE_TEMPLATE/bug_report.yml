name: Bug report
description: Godot 실행 문제나 버그를 기록합니다.
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: 문제 요약
      description: 어떤 문제가 발생했는지 짧게 적어주세요.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 재현 순서
      description: Godot에서 어떤 순서로 실행하면 문제가 보이는지 적어주세요.
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 기대 결과
      description: 원래는 어떻게 동작해야 하나요?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 실제 결과
      description: 실제로는 어떻게 동작했나요?
    validations:
      required: true
  - type: input
    id: godot-version
    attributes:
      label: Godot 버전
      placeholder: 예: 4.7 stable
  - type: textarea
    id: logs
    attributes:
      label: Output / Debugger 로그
      description: 에러가 있다면 Godot Output 또는 Debugger 메시지를 붙여주세요.
