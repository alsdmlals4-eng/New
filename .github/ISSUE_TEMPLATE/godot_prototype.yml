name: Godot MVP task
description: my little boat Godot MVP 작업을 정의합니다.
title: "[Godot MVP] "
labels: ["godot", "mvp"]
body:
  - type: textarea
    id: player_experience
    attributes:
      label: 플레이어 경험
      description: 플레이어가 어떤 감정을 느껴야 하는지 적어주세요.
      placeholder: 예: 조용히 바다를 보며 오늘의 마음을 정리한다.
    validations:
      required: true
  - type: textarea
    id: core_loop
    attributes:
      label: 핵심 루프
      description: 반복되는 플레이 흐름을 짧게 적어주세요.
      placeholder: 예: 마음 선택 -> 항해 -> 사진/편지/풍경 기록 -> 앨범 확인.
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: 이번 MVP 범위
      value: |
        - [ ]
        - [ ]
        - [ ]
    validations:
      required: true
  - type: textarea
    id: controls
    attributes:
      label: 입력 방식
      description: 모바일 세로 화면과 PC에서 어떻게 조작할지 적어주세요.
      placeholder: 예: 모바일은 버튼 터치, PC는 마우스 클릭.
    validations:
      required: true
  - type: textarea
    id: test
    attributes:
      label: Godot 테스트 방법
      description: 어떤 씬을 열고 무엇을 확인해야 하는지 적어주세요.
      placeholder: 예: Godot에서 scenes/game.tscn을 실행하고 사진찍기 버튼을 누른다.
    validations:
      required: true
  - type: textarea
    id: exclusions
    attributes:
      label: 제외할 것
      value: |
        - 전투
        - 실패 조건
        - 결제
        - 광고
        - 온라인 기능
        - 유료 에셋 의존
